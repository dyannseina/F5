<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yiling盧娜</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a855f7;
            --secondary: #22d3ee;
            --accent: #f472b6;
            --bg: #030712;
            --card-bg: rgba(15, 23, 42, 0.4);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            background: var(--bg);
            overflow-x: hidden;
            line-height: 1.6;
            scrollbar-width: none; 
        }
        body::-webkit-scrollbar { display: none; }

        /* Custom Cursor - CHỈ KÍCH HOẠT TRÊN DESKTOP */
        @media (pointer: fine) {
            * { cursor: none !important; }
            #cursor-dot { width: 6px; height: 6px; background: #fff; position: fixed; border-radius: 50%; pointer-events: none; z-index: 10000; }
            #cursor-outline { 
                width: 40px; height: 40px; border: 1.5px solid rgba(255,255,255,0.3); 
                position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; 
                transition: width 0.3s, height 0.3s, background 0.3s, border 0.3s;
                will-change: transform;
            }
        }
        @media (pointer: coarse) {
            #cursor-dot, #cursor-outline { display: none !important; }
        }

        /* Background Layers */
        .gif-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://files.catbox.moe/be2jxe.gif'); 
            background-size: cover; background-position: center;
            opacity: 0.12; filter: blur(2px); z-index: -5;
        }

        #canvas-stars { position: fixed; top: 0; left: 0; z-index: -3; opacity: 0.6; }

        /* Hero Section */
        .hero {
            min-height: 100vh; min-height: 100dvh; /* Tối ưu cho Mobile Browser */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 1000px; padding: 20px; text-align: center;
        }

        .avatar-wrap {
            position: relative; padding: 10px;
            animation: float 6s ease-in-out infinite;
        }

        .avatar-container {
            width: clamp(140px, 35vw, 190px); 
            height: clamp(140px, 35vw, 190px);
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            padding: 5px; animation: morphing 10s infinite alternate;
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.4);
        }

        .avatar-img {
            width: 100%; height: 100%; border-radius: inherit;
            object-fit: cover; border: 4px solid var(--bg);
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 800; letter-spacing: -2px;
            margin-top: 20px; position: relative;
            background: linear-gradient(90deg, #fff, #94a3b8, #fff);
            background-size: 200%; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        .typing-container {
            font-size: clamp(0.7rem, 2vw, 0.8rem); 
            letter-spacing: 3px; color: var(--secondary);
            text-transform: uppercase; margin-bottom: 40px; opacity: 0.8;
            min-height: 20px; /* Tránh giật layout khi gõ chữ */
        }

        /* Container & Cards Animation */
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px; 
            padding: clamp(25px, 5vw, 40px); /* Co giãn padding */
            margin-bottom: 25px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @media (pointer: fine) {
            .glass-card:hover { border-color: rgba(255,255,255,0.2); transform: scale(1.02); }
        }

        /* Social Icons */
        .social-flex { display: flex; gap: clamp(10px, 3vw, 20px); justify-content: center; flex-wrap: wrap; }
        .magnetic-btn {
            width: clamp(45px, 12vw, 55px); height: clamp(45px, 12vw, 55px); 
            border-radius: 50%;
            background: var(--card-bg); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-decoration: none; font-size: 1.3rem;
            transition: transform 0.2s, background 0.3s;
        }
        @media (pointer: fine) {
            .magnetic-btn:hover { background: #fff; color: #000; border-color: #fff; }
        }

        /* Game Grid Styling */
        .game-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .game-card {
            padding: 20px; display: flex; align-items: center; gap: 20px;
            border-left: 4px solid var(--secondary); margin-bottom: 0;
        }
        .game-icon { font-size: 1.8rem; color: var(--secondary); opacity: 0.8; flex-shrink: 0; }

        /* Audio Player Custom */
        .music-player { display: flex; align-items: center; gap: 20px; }
        .album-art { 
            width: clamp(60px, 15vw, 80px); height: clamp(60px, 15vw, 80px); 
            border-radius: 20px; 
            object-fit: cover; animation: rotate 12s linear infinite paused;
            flex-shrink: 0;
        }
        .album-art.playing { animation-play-state: running; }

        .play-trigger {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: #fff; color: #000; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s; flex-shrink: 0;
        }
        @media (pointer: fine) {
            .play-trigger:hover { transform: scale(1.1) rotate(10deg); background: var(--secondary); color: #fff; }
        }

        .prog-bar-container {
            height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 10px; margin-top: 25px; overflow: hidden; cursor: pointer;
        }
        #prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary)); pointer-events: none; }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes morphing {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 50% 50% 30% 70% / 50% 60% 40% 50%; }
            100% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Responsive cho thiết bị rất nhỏ (Mobile dọc) */
        @media (max-width: 500px) {
            .music-player { flex-direction: column; text-align: center; }
            .play-trigger { margin-top: 10px; width: 55px; height: 55px;}
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <div class="gif-bg"></div>
    <canvas id="canvas-stars"></canvas>

    <section class="hero">
        <div class="avatar-wrap">
            <div class="avatar-container">
                <img src="https://files.catbox.moe/j79cf5.jpg" class="avatar-img" alt="Yiling">
            </div>
        </div>
        <h1>Yiling盧娜</h1>
        <div class="typing-container" id="typewriter"></div>
        
        <div class="social-flex">
            <a href="https://facebook.com/lunatis.ur" class="magnetic-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="https://instagram.com/yiling.tdy" class="magnetic-btn"><i class="fab fa-instagram"></i></a>
            <a href="https://tiktok.com/@thduyen.yiling" class="magnetic-btn"><i class="fab fa-tiktok"></i></a>
            <a href="https://discord.gg/NnsrERae" class="magnetic-btn"><i class="fab fa-discord"></i></a>
        </div>
    </section>

    <div class="container">
        <div class="glass-card reveal">
            <h2 style="font-size: 0.7rem; letter-spacing: 4px; color: var(--secondary); margin-bottom: 15px; text-transform: uppercase; text-align: center;">关于我自己</h2>
            <p style="font-size: clamp(1rem, 3vw, 1.15rem); font-weight: 200; font-style: italic; opacity: 0.8; line-height: 1.8; text-align: center;">
                "如果不是真心的，请不要对我太好。我的心很容易误以为那是真爱。"
            </p>
        </div>

        <div class="game-grid reveal">
            <div class="glass-card game-card">
                <div class="game-icon"><i class="fas fa-shield-cat"></i></div>
                <div>
                    <p style="font-size: 0.7rem; opacity: 0.5;">Liên Quân Mobile</p>
                    <p style="font-weight: 600;">Ƴiling盧娜</p>
                </div>
            </div>
            <div class="glass-card game-card" style="border-left-color: var(--primary);">
                <div class="game-icon" style="color: var(--primary);"><i class="fas fa-dragon"></i></div>
                <div>
                    <p style="font-size: 0.7rem; opacity: 0.5;">王者荣耀</p>
                    <p style="font-weight: 600;">hggan</p>
                </div>
            </div>
            <div class="glass-card game-card" style="border-left-color: #facc15;">
                <div class="game-icon" style="color: #facc15;"><i class="fas fa-gem"></i></div>
                <div>
                    <p style="font-size: 0.7rem; opacity: 0.5;">Genshin Impact</p>
                    <p style="font-weight: 600;">UID: 842578123</p>
                </div>
            </div>
        </div>

        <div class="glass-card reveal" style="margin-top: 25px;">
            <div class="music-player">
                <img src="https://i.ytimg.com/vi/w8r5zDA4awM/maxresdefault.jpg" class="album-art" id="art">
                <div style="flex-grow: 1;">
                    <h3 style="font-size: clamp(1.1rem, 3vw, 1.2rem); margin-bottom: 5px;">Em Không Khóc</h3>
                    <p style="font-size: 0.8rem; opacity: 0.5;">buitruonglinh ft. Vũ Phụng Tiên</p>
                </div>
                <button class="play-trigger" id="playBtn"><i class="fas fa-play"></i></button>
            </div>
            <div class="prog-bar-container" id="prog-wrap">
                <div id="prog-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Check thiết bị (Mobile hay Desktop)
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // 1. Smooth Cursor (Chỉ chạy JS nếu là Desktop)
        if (!isTouchDevice) {
            const dot = document.getElementById('cursor-dot');
            const outline = document.getElementById('cursor-outline');
            let mouseX = 0, mouseY = 0, outlineX = 0, outlineY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                dot.style.top = mouseY + 'px';
                dot.style.left = mouseX + 'px';
            });

            function animateCursor() {
                outlineX += (mouseX - outlineX) * 0.15;
                outlineY += (mouseY - outlineY) * 0.15;
                outline.style.transform = `translate(${outlineX - 20}px, ${outlineY - 20}px)`;
                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            document.querySelectorAll('a, button, .prog-bar-container').forEach(el => {
                el.onmouseenter = () => {
                    outline.style.width = '60px'; outline.style.height = '60px';
                    outline.style.background = 'rgba(255,255,255,0.1)';
                    outline.style.borderColor = '#fff';
                };
                el.onmouseleave = () => {
                    outline.style.width = '40px'; outline.style.height = '40px';
                    outline.style.background = 'transparent';
                    outline.style.borderColor = 'rgba(255,255,255,0.3)';
                };
            });
        }

        // 2. Scroll Reveal Logic
        function reveal() {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(r => {
                const windowHeight = window.innerHeight;
                const elementTop = r.getBoundingClientRect().top;
                if (elementTop < windowHeight - 50) r.classList.add('active');
            });
        }
        window.addEventListener('scroll', reveal);
        window.addEventListener('load', reveal);

        // 3. Poly-Grid Particles Tối ưu hóa
        const canvas = document.getElementById('canvas-stars');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Giảm số lượng hạt trên màn hình nhỏ để tránh giật lag
            const particleCount = window.innerWidth < 768 ? 30 : 70; 
            
            particles = Array.from({length: particleCount}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3
            }));
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();

                for(let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 120) {
                        ctx.strokeStyle = `rgba(34, 211, 238, ${0.12 - dist/1000})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawStars);
        }

        // 4. Typing Effect
        const txt = "MiCay, MatchaLatte va Anh";
        let idx = 0;
        function type() {
            if(idx < txt.length) {
                document.getElementById('typewriter').textContent += txt[idx++];
                setTimeout(type, 80);
            }
        }

        // 5. Audio Player Logic
        const audio = new Audio('https://files.catbox.moe/wmqyfw.mp3');
        const playBtn = document.getElementById('playBtn');
        const art = document.getElementById('art');
        let isPlaying = false;

        playBtn.onclick = () => {
            if(!isPlaying) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                art.classList.add('playing');
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                art.classList.remove('playing');
            }
            isPlaying = !isPlaying;
        };

        audio.ontimeupdate = () => {
            document.getElementById('prog-fill').style.width = (audio.currentTime/audio.duration)*100 + '%';
        };

        // Tua nhạc hỗ trợ cả chạm cảm ứng
        const progWrap = document.getElementById('prog-wrap');
        const updateAudioProgress = (e) => {
            const rect = progWrap.getBoundingClientRect();
            const clickX = (e.clientX || e.touches[0].clientX) - rect.left;
            audio.currentTime = (clickX / rect.width) * audio.duration;
        };
        
        progWrap.addEventListener('click', updateAudioProgress);
        progWrap.addEventListener('touchmove', updateAudioProgress);

        // Run all
        initStars(); drawStars(); setTimeout(type, 500); // Delay gõ chữ một xíu để mượt hơn
        
        // Cập nhật lại canvas khi xoay màn hình điện thoại
        window.addEventListener('resize', () => {
            initStars();
            reveal();
        });
    </script>
</body>
</html>
