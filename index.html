<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yiling | 黄玉灵</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a5b4fc;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            overflow-x: hidden;
            background: #0f172a;
        }

        /* Background */
        .bg-gif {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://files.catbox.moe/be2jxe.gif') center/cover no-repeat fixed;
            z-index: -4;
            filter: brightness(0.55) contrast(1.2);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(15,23,42,0.85));
            z-index: -3;
        }

        #snow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -2;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .avatar-container {
            width: 240px;
            height: 240px;
            margin: 0 auto 35px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid rgba(165, 180, 252, 0.85);
            box-shadow: 0 0 90px rgba(165, 180, 252, 0.8);
            transition: all 0.6s ease;
            animation: float 7s ease-in-out infinite;
        }

        .avatar:hover {
            transform: scale(1.15) rotate(15deg);
            box-shadow: 0 0 140px rgba(165, 180, 252, 1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        h1 {
            font-size: 4.8rem;
            font-weight: 900;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #c4d0ff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .typing {
            font-size: 1.85rem;
            color: var(--accent);
            overflow: hidden;
            white-space: nowrap;
            border-right: 6px solid var(--accent);
            width: 0;
            animation: typing 3.8s steps(35, end) forwards, blink 0.75s step-end infinite;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }

        .social-links a {
            width: 68px;
            height: 68px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.1rem;
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.6) translateY(40px);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .social-links a.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* ==================== MUSIC PLAYER KHUNG (dưới phần Game) ==================== */
        .music-section {
            padding: 80px 8%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .music-player {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(165, 180, 252, 0.25);
            border-radius: 28px;
            padding: 28px 32px;
            max-width: 680px;
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            transition: all 0.4s ease;
        }

        .music-player:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(165, 180, 252, 0.4);
            transform: translateY(-8px);
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 22px;
        }

        .song-cover {
            width: 85px;
            height: 85px;
            border-radius: 20px;
            object-fit: cover;
            border: 3px solid rgba(165, 180, 252, 0.4);
            box-shadow: 0 0 25px rgba(165, 180, 252, 0.3);
        }

        .song-details {
            flex: 1;
        }

        .song-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .song-artist {
            font-size: 1.02rem;
            color: var(--accent);
            opacity: 0.9;
        }

        /* Progress */
        .progress-container {
            height: 8px;
            background: rgba(255,255,255,0.12);
            border-radius: 9999px;
            cursor: pointer;
            margin: 20px 0 12px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a5b4fc, #6366f1);
            border-radius: 9999px;
            box-shadow: 0 0 15px rgba(165, 180, 252, 0.7);
        }

        /* Controls */
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
        }

        .control-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 1.6rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            color: white;
            transform: scale(1.15);
        }

        .play-pause-btn {
            width: 68px;
            height: 68px;
            background: rgba(165, 180, 252, 0.15);
            border: 2.5px solid var(--accent);
            color: white;
            font-size: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .play-pause-btn:hover {
            background: var(--accent);
            color: #0f172a;
            transform: scale(1.1);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        /* Các section khác */
        .section {
            padding: 140px 8%;
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(80px);
            transition: all 1.2s ease;
            position: relative;
            z-index: 2;
        }

        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .about-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 32px;
            padding: 85px 75px;
            text-align: center;
        }

        h2 {
            font-size: 3.4rem;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #c4d0ff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .game-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(165, 180, 252, 0.25);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            transition: all 0.5s ease;
        }

        .game-card:hover {
            transform: translateY(-12px);
            border-color: var(--accent);
        }

        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 58px;
            height: 58px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: none;
            border-radius: 50%;
            font-size: 1.9rem;
            z-index: 1001;
            cursor: pointer;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { 50% { border-color: transparent; } }
        @keyframes musicPop {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-gif"></div>
    <div class="overlay"></div>
    <canvas id="snow"></canvas>

    <button class="theme-toggle" id="themeToggle">🌙</button>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <div class="avatar-container">
                <img src="https://files.catbox.moe/j79cf5.jpg" alt="Yiling" class="avatar">
            </div>
            <h1>Yiling盧娜</h1>
            <p class="typing">AOV • HOK • GI</p>

            <div class="social-links" id="socialLinks">
                <a href="https://www.facebook.com/lunatis.ur" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com/yiling.tdy" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://tiktok.com/@thduyen.yiling" target="_blank"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </section>

    <!-- About -->
    <section class="section" id="about">
        <div class="about-card">
            <h2>关于我自己</h2>
            <p style="font-size: 1.32rem; max-width: 780px; margin: 0 auto; line-height: 1.85;">
              如果不是真心的，请不要对我太好。我的心很容易误以为那是真爱。
            </p>
        </div>
    </section>

    <!-- Games -->
    <section class="section" id="games">
        <h2>游戏</h2>
        <div class="games-grid">
            <div class="game-card">
                <h3>Liên Quân Mobile</h3>
                <p>InGame: Ƴiling盧娜</p>
            </div>
            <div class="game-card">
                <h3>王者荣耀</h3>
                <p>InGame: hggan</p>
            </div>
            <div class="game-card">
                <h3>Genshin Impact</h3>
                <p>UID: 842578123</p>
            </div>
        </div>
    </section>

    <!-- Music Player - Khung mới dưới phần Game -->
    <div class="music-section">
        <div class="music-player" id="musicPlayer">
            <div class="now-playing">
                <img src="https://i.ytimg.com/vi/w8r5zDA4awM/maxresdefault.jpg" 
                     alt="Em Không Khóc" class="song-cover">
                
                <div class="song-details">
                    <div class="song-title" id="songTitle">Em Không Khóc</div>
                    <div class="song-artist" id="songArtist">buitruonglinh ft. Vũ Phụng Tiên</div>
                </div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="player-controls">
                <button class="control-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                <button class="play-pause-btn" id="playPause">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <script>
        // Tuyết rơi
        function createSnow() {
            const canvas = document.getElementById('snow');
            const ctx = canvas.getContext('2d');
            let snowflakes = [];

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            class Snowflake {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height - canvas.height;
                    this.radius = Math.random() * 3.5 + 1.2;
                    this.speed = Math.random() * 1.8 + 0.8;
                    this.angle = Math.random() * Math.PI * 2;
                    this.swing = Math.random() * 1.5 + 0.8;
                }
                update() {
                    this.y += this.speed;
                    this.x += Math.sin(this.angle) * this.swing;
                    this.angle += 0.02;
                    if (this.y > canvas.height + 10) this.reset();
                }
                draw() {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initSnow() {
                snowflakes = [];
                for (let i = 0; i < 180; i++) snowflakes.push(new Snowflake());
            }

            function animateSnow() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                snowflakes.forEach(flake => {
                    flake.update();
                    flake.draw();
                });
                requestAnimationFrame(animateSnow);
            }

            resizeCanvas();
            initSnow();
            animateSnow();

            window.addEventListener('resize', () => {
                resizeCanvas();
                initSnow();
            });
        }

        // Music Player
        let audio = new Audio('https://files.catbox.moe/wmqyfw.mp3');
        let isPlaying = false;

        const playPauseBtn = document.getElementById('playPause');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            } else {
                audio.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            }
            isPlaying = !isPlaying;
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
                durationEl.textContent = formatTime(audio.duration);
            }
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });

        audio.addEventListener('ended', () => {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            isPlaying = false;
        });

        // Social & Scroll Animation
        function animateSocialIcons() {
            const icons = document.querySelectorAll('.social-links a');
            icons.forEach((icon, i) => {
                setTimeout(() => icon.classList.add('visible'), 800 + i * 180);
            });
        }

        function revealOnScroll() {
            document.querySelectorAll('.section').forEach(sec => {
                if (sec.getBoundingClientRect().top < window.innerHeight * 0.8) {
                    sec.classList.add('visible');
                }
            });
        }

        });

        window.onload = () => {
            createSnow();
            animateSocialIcons();
            revealOnScroll();
            window.addEventListener('scroll', revealOnScroll);
        };
    </script>
</body>
</html>
